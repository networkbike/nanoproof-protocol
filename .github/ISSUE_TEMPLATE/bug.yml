name: 🐛 Bug Report
description: File a bug to help us improve NanoProof.
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill out the sections below so we can reproduce + fix it quickly.

  - type: input
    id: version
    attributes:
      label: Package + Version
      description: Which package is affected, and on what version?
      placeholder: "@nanoproof/sdk@0.1.0"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which surface is this bug in?
      options:
        - Frontend (`apps/web`)
        - API (`apps/api`)
        - SDK (`packages/sdk`)
        - Citation Engine (`packages/citation-engine`)
        - Payment Engine (`packages/payment-engine`)
        - Smart Contracts (`contracts/`)
        - Documentation (`docs/`)
        - CI / Tooling
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences. What broke?
      placeholder: "The Payment Engine fails to settle when..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. `pnpm install`
        2. `pnpm --filter @nanoproof/api dev`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs, screenshots, or a txHash.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 — Funds at risk / system down
        - P1 — Major degradation
        - P2 — Minor degradation
        - P3 — Cosmetic / non-functional
    validations:
      required: true