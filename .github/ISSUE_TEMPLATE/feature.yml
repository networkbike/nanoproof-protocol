name: 💡 Feature Request
description: Suggest a new feature or protocol change.
labels: ["feature", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Help us understand the problem before jumping to the solution.

  - type: textarea
    id: problem
    attributes:
      label: The Problem
      description: What pain are you trying to solve? For whom?
      placeholder: |
        As an AI agent developer, when I integrate NanoProof with ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you solve it? Sketch the API or the user flow.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider, and why this one?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - API
        - SDK
        - Citation Engine
        - Payment Engine
        - Smart Contracts
        - Protocol Spec
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: roadmap
    attributes:
      label: Roadmap Phase
      description: If you know which roadmap phase this belongs to.
      options:
        - Phase 1 — Repository Foundation
        - Phase 2 — Creator Registry
        - Phase 3 — Citation Engine
        - Phase 4 — AI Research Agent
        - Phase 5 — Payment Engine
        - Phase 6 — Analytics Dashboard
        - Phase 7 — Arc Integration
        - Phase 8 — Protocol SDK
        - Phase 9 — Public Beta
        - Post-Beta
        - Not sure

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Anything else worth mentioning. Links, screenshots, mockups.