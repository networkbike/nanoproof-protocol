# =============================================================================
# NanoProof Protocol — Render.com Blueprint
#
# Deploy with: Render Dashboard → New → Blueprint → point at this file.
# Schema: https://render.com/schema/render.yaml.json
#
# IMPORTANT: Render services have IMMUTABLE runtime. Once a service is
# created with `runtime: node`, it cannot be changed to `runtime: docker`.
# This file uses `runtime: node` (native). The .node-version file in the
# repo root pins Node to 22.11.0 which has corepack 0.31+ with the new
# npm signing keys (fixes the pnpm 9.x "Cannot find matching keyid" error).
# =============================================================================

databases:
  - name: nanoproof-db
    plan: free
    region: oregon
    databaseName: nanoproof
    user: nanoproof
    postgresMajorVersion: '16'

services:
  # --------------------------------------------------------------------------
  # API (NestJS)
  # --------------------------------------------------------------------------
  - type: web
    name: nanoproof-api
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/api
    buildCommand: |
      cd ../.. && \
      npm install -g corepack@latest --silent && \
      corepack enable --install-directory /usr/local/bin && \
      corepack prepare pnpm@9.15.9 --activate && \
      pnpm --version && \
      pnpm install --frozen-lockfile && \
      pnpm --filter @nanoproof/shared build && \
      pnpm --filter @nanoproof/api db:generate && \
      pnpm --filter @nanoproof/api build
    preDeployCommand: |
      cd ../.. && \
      pnpm --filter @nanoproof/api exec prisma migrate deploy
    startCommand: node dist/apps/api/src/main.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: LOG_LEVEL
        value: info
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: nanoproof-db
          property: connectionString
      - key: DATABASE_POOL_SIZE
        value: 10
      - key: DATABASE_POOL_TIMEOUT_MS
        value: 5000
      - key: CORS_ORIGINS
        sync: false
      - key: NANOPROOF_DEMO_MODE
        value: "true"
      - key: PAYMENTS_ENABLED
        value: "true"
      - key: CITATION_ENGINE_ENABLED
        value: "true"
      - key: ARC_RPC_URL
        value: https://rpc.testnet.arc.network
      - key: ARC_CHAIN_ID
        value: arc-testnet
      - key: ARCSCAN_URL
        value: https://testnet.arcscan.app
      - key: RATE_LIMIT_PER_MINUTE
        value: 600

  # --------------------------------------------------------------------------
  # Web (Next.js)
  # --------------------------------------------------------------------------
  - type: web
    name: nanoproof-web
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/web
    buildCommand: |
      cd ../.. && \
      npm install -g corepack@latest --silent && \
      corepack enable --install-directory /usr/local/bin && \
      corepack prepare pnpm@9.15.9 --activate && \
      pnpm --version && \
      pnpm install --frozen-lockfile && \
      pnpm --filter @nanoproof/shared build && \
      pnpm --filter @nanoproof/agent build && \
      pnpm --filter @nanoproof/web build
    startCommand: cd ../.. && node apps/web/node_modules/next/dist/bin/next start -p 3000 -H 0.0.0.0
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "true"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
