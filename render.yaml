# =============================================================================
# NanoProof Protocol — Render.com Blueprint
#
# Deploy with: Render Dashboard → New → Blueprint → point at this file.
# Schema: https://render.com/schema/render.yaml.json
#
# Creates:
#   - nanoproof-db    : Postgres 16 (free tier, 256 MB, 1 GB storage, 90-day)
#   - nanoproof-api   : NestJS API (Web Service, Node 22)
#   - nanoproof-web   : Next.js 15 frontend (Web Service)
#
# All three deploy from the same GitHub repo on push to `main`.
#
# NOTES:
#   - Postgres is declared under top-level `databases:` (NOT services:),
#     per Render's Blueprint schema. Putting it under `services:` with
#     `type: pserv` is rejected with "invalid runtime".
#   - `runtime: node` is a native-language runtime; valid values are:
#     node, python, elixir, go, ruby, rust, docker, image, static.
#   - `startCommand` is REQUIRED for non-Docker services.
#   - `autoDeploy` (boolean) was renamed to `autoDeployTrigger` (one of
#     `commit` | `checksPass` | `off`) — using `commit` here.
# =============================================================================

databases:
  # --------------------------------------------------------------------------
  # Postgres 16 (managed)
  # --------------------------------------------------------------------------
  - name: nanoproof-db
    plan: free                       # 256 MB RAM, 1 GB storage, 90-day expiry
    region: oregon
    databaseName: nanoproof
    user: nanoproof
    postgresMajorVersion: '16'
    # Render injects DATABASE_URL into the api service automatically
    # via fromDatabase below. No env vars needed here.

services:
  # --------------------------------------------------------------------------
  # API (NestJS)
  # --------------------------------------------------------------------------
  - type: web
    name: nanoproof-api
    runtime: docker
    plan: free                       # spins down after 15 min idle (fine for demos)
    region: oregon
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerContext: ../..
    dockerCommand: sh -c "npx --no-install prisma migrate deploy || true; node dist/apps/api/src/main.js"
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: nanoproof-db
          property: connectionString
      - key: DATABASE_POOL_SIZE
        value: 10
      - key: DATABASE_POOL_TIMEOUT_MS
        value: 5000
      - key: CORS_ORIGINS
        sync: false                # set in dashboard after web deploy
      - key: NANOPROOF_DEMO_MODE
        value: "true"
      - key: PAYMENTS_ENABLED
        value: "true"
      - key: CITATION_ENGINE_ENABLED
        value: "true"
      - key: ARC_RPC_URL
        value: https://rpc.testnet.arc.network
      - key: ARC_CHAIN_ID
        value: arc-testnet
      - key: ARCSCAN_URL
        value: https://testnet.arcscan.app
      - key: RATE_LIMIT_PER_MINUTE
        value: 600

  # --------------------------------------------------------------------------
  # Web (Next.js)
  # --------------------------------------------------------------------------
  - type: web
    name: nanoproof-web
    runtime: docker
    plan: free
    region: oregon
    rootDir: apps/web
    dockerfilePath: ./Dockerfile
    dockerContext: ../..
    dockerCommand: sh -c "PORT=3000 HOSTNAME=0.0.0.0 node node_modules/next/dist/bin/next start -p 3000"
    autoDeployTrigger: commit
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false                # set to https://nanoproof-api.onrender.com
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "true"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"