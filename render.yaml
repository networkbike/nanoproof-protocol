# =============================================================================
# NanoProof Protocol — Render.com Blueprint
#
# IMPORTANT: Render's runtime field is IMMUTABLE. To switch from
# runtime:node to runtime:docker, the service must be DELETED and
# recreated by Blueprint.
#
# Current strategy: native Node 22.11.0 with simplified pnpm
# build that does NOT use any custom corepack shimming. This
# avoids the runner.sh initialization issue we hit when using
# custom build scripts.
#
# Schema: https://render.com/schema/render.yaml.json
# =============================================================================

databases:
  - name: nanoproof-db
    plan: free
    region: oregon
    databaseName: nanoproof
    user: nanoproof
    postgresMajorVersion: '16'

services:
  # --------------------------------------------------------------------------
  # API (NestJS)
  # --------------------------------------------------------------------------
  - type: web
    name: nanoproof-api
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/api
    # Simplest possible buildCommand. Render's native node runtime
    # expects to be able to invoke pnpm directly (not through custom
    # corepack shims). The .node-version file pins Node 22.11.0
    # which has the new npm signing keys.
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @nanoproof/shared build && pnpm --filter @nanoproof/api db:generate && pnpm --filter @nanoproof/api build
    startCommand: node dist/apps/api/src/main.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: nanoproof-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: NANOPROOF_DEMO_MODE
        value: "true"
      - key: PAYMENTS_ENABLED
        value: "true"
      - key: CITATION_ENGINE_ENABLED
        value: "true"
      - key: ARC_RPC_URL
        value: https://rpc.testnet.arc.network
      - key: ARC_CHAIN_ID
        value: arc-testnet
      - key: ARCSCAN_URL
        value: https://testnet.arcscan.app
      - key: RATE_LIMIT_PER_MINUTE
        value: 600

  # --------------------------------------------------------------------------
  # Web (Next.js)
  # --------------------------------------------------------------------------
  - type: web
    name: nanoproof-web
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/web
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @nanoproof/shared build && pnpm --filter @nanoproof/agent build && pnpm --filter @nanoproof/web build
    startCommand: cd ../.. && node apps/web/node_modules/next/dist/bin/next start -p 3000 -H 0.0.0.0
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "true"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
