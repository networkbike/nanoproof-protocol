version: "3.9"

# Local development stack. Production uses Neon Postgres + Upstash Redis.
services:
  postgres:
    image: postgres:16-alpine
    container_name: nanoproof-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nanoproof
    ports:
      - "5432:5432"
    volumes:
      - nanoproof-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nanoproof"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nanoproof-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nanoproof-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nanoproof-postgres:
  nanoproof-redis: